        .back-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .back-btn i {
            font-size: 18px;
            transition: transform 0.2s ease;
        }

        .back-btn:hover {
            background: var(--bg-hover);
            color: var(--primary);
        }

        .back-btn:hover i {
            transform: translateX(-3px);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        body.light-mode .back-btn {
            color: #64748b;
        }

        body.light-mode .back-btn:hover {
            background: rgba(79,70,229,0.05);
            color: var(--primary);
        }

        .camera-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .camera-btn:hover {
            background: var(--bg-hover);
            color: var(--primary);
            transform: scale(1.1);
        }

        .camera-btn i {
            font-size: 20px;
        }

        .typing-indicator-bot {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-input);
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            align-self: flex-start;
            margin: 5px 0;
        }

        .typing-indicator-bot span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator-bot span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator-bot span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

            max-height: 200px;

            margin-bottom: 10px;

        async function askAI(prompt, imageUrl = null) {
            try {
                const body = imageUrl 
                    ? { message: prompt, imageUrl: imageUrl }
                    : { message: prompt };
                
                const response = await fetch(API_CONFIG.chat, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                
                if (data.error) {
                    return "❌ " + data.error;
                }
                
                return data.response || "I'm here to help!";
                
            } catch (err) {
                console.error("AI Error:", err);
                return "❌ AI service unavailable. Please try again.";
            }
        }

        async function uploadImage(file) {
            try {
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`${API_CONFIG.imgbb}?key=${API_CONFIG.imgbbKey}`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                console.log("IMGBB response:", data);

                if (!data.success) throw new Error(data.error?.message || "Upload failed");

                return data.data.url;
            } catch (err) {
                console.error("Upload Error:", err);
                throw new Error("Image upload failed: " + err.message);
            }
        }

        async function defineWord(word) {
            try {
                const response = await fetch(`${API_CONFIG.dictionary}/${encodeURIComponent(word)}`);
                const data = await response.json();
                
                if (data.title === "No Definitions Found") {
                    return "❌ No definition found for " + word + ".";
                }

                let result = "📖 " + word + "\n\n";
                data[0].meanings.forEach(m => {
                    result += m.partOfSpeech + "\n";
                    m.definitions.slice(0, 2).forEach(d => {
                        result += "• " + d.definition + "\n";
                        if (d.example) result += "  ✏️ " + d.example + "\n";
                    });
                    result += "\n";
                });

                return result;
            } catch {
                return "❌ Could not find definition for " + word + ".";
            }
        }

        async function getSynonyms(word) {
            try {
                const response = await fetch(`${API_CONFIG.datamuse}?rel_syn=${encodeURIComponent(word)}&max=10`);
                const data = await response.json();
                
                if (!data.length) return "❌ No synonyms found for " + word + ".";

                return "🔤 Synonyms:\n" + data.map((w,i)=> (i+1) + ". " + w.word).join("\n");
            } catch {
                return "❌ Synonym service unavailable.";
            }
        }

        async function handleImageUpload() {
            const input = document.getElementById('botMessageInput');
            const message = input.value.trim();
            
            if (!message.startsWith('/ai')) {
                alert("⚠️ Type '/ai [question]' first!");
                input.focus();
                return;
            }
            
            const prompt = message.replace('/ai', '').trim();
            if (!prompt) {
                alert("❌ Add a question after /ai");
                input.focus();
                return;
            }
            
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                addBotMessage("📤 Uploading image...", false);
                
                try {
                    const imageUrl = await uploadImage(file);
                    
                    const msgs = document.getElementById('botMessages');
                    if (msgs.lastChild && msgs.lastChild.textContent.includes('Uploading')) {
                        msgs.lastChild.remove();
                    }
                    
                    addUserMessageWithImage(prompt, imageUrl);
                    
                    showTyping();

                    const response = await askAI(prompt, imageUrl);
                    
                    hideTyping();
                    addBotMessage("🤖 AI Says\n" + response, false);
                    
                    input.value = '';
                    
                } catch (error) {
                    hideTyping();
                    addBotMessage("❌ Upload failed: " + error.message, false);
                }
            };
            
            fileInput.click();
        }

        function addBotMessage(text, isUser = false) {
            const container = document.getElementById('botMessages');
            const wrapper = document.createElement('div');
            wrapper.className = 'bot-message-wrapper ' + (isUser ? 'user' : '');
            
            if (!isUser) {
                const avatar = document.createElement('div');
                avatar.className = 'bot-message-avatar';
                avatar.innerHTML = '<img src="https://i.ibb.co/KjkPv6xw/Ilustraci-n-de-dibujos-animados-lindo-robot-agitando-la-mano-Vector-Premium.jpg" alt="Bot">';
                wrapper.appendChild(avatar);
            }
            
            const content = document.createElement('div');
            content.className = 'bot-message-content';
            
            if (!isUser) {
                const name = document.createElement('div');
                name.className = 'bot-name-tag';
                name.innerHTML = '<i class="fas fa-robot"></i> Mini Assistant';
                content.appendChild(name);
            }
            
            const textDiv = document.createElement('div');
            textDiv.className = 'bot-message-text';
            textDiv.innerHTML = text.replace(/\n/g, '<br>');
            content.appendChild(textDiv);
            
            const time = document.createElement('div');
            time.className = 'bot-message-time';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            content.appendChild(time);
            
            wrapper.appendChild(content);
            
            const welcome = container.querySelector('.welcome-message');
            if (welcome) welcome.remove();
            
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function addUserMessageWithImage(prompt, imageUrl) {
            const container = document.getElementById('botMessages');
            const wrapper = document.createElement('div');
            wrapper.className = 'bot-message-wrapper user';
            
            const content = document.createElement('div');
            content.className = 'bot-message-content';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'bot-message-text';
            textDiv.innerHTML = '<img src="' + imageUrl + '" class="message-image-preview" onclick="window.open(\'' + imageUrl + '\')"><br><strong>Prompt:</strong> ' + prompt;
            content.appendChild(textDiv);
            
            const time = document.createElement('div');
            time.className = 'bot-message-time';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            content.appendChild(time);
            
            wrapper.appendChild(content);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('botMessages');
            const typing = document.createElement('div');
            typing.className = 'typing-indicator-bot';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function getHelp() {
            return "╭────────────────────╮\n│   🤖 COMMANDS       │\n╰────────────────────╯\n\n╭━━━ AI & CHAT ━━━╮\n┃ 🤖 /ai [question] • Ask AI (with image)\n╰━━━━━━━━━━━━━━╯\n\n╭━━━ FUN ━━━╮\n┃ 😂 /joke • Random joke\n┃ 🤔 /fact • Random fact\n┃ 💭 /quote • Inspiration\n╰━━━━━━━━━━━━━━╯\n\n╭━━━ DICTIONARY ━━━╮\n┃ 📖 /define [word] • Definition\n┃ 🔤 /synonym [word] • Synonyms\n┃ 🔄 /antonym [word] • Antonyms\n╰━━━━━━━━━━━━━━╯\n\n╭━━━ MATH ━━━╮\n┃ 🧮 /calc [exp] • Calculate\n┃ ➗ /math [exp] • Math solver\n╰━━━━━━━━━━━━━━╯\n\n╭━━━ UTILITIES ━━━╮\n┃ 📝 /note [text] • Save note\n┃ 📋 /notes • View notes\n┃ ⏲️ /timer [sec] • Set timer\n┃ 🔔 /remind [text] • Reminder\n┃ ℹ️ /info • Bot info\n┃ 🧹 /clear • Clear chat\n╰━━━━━━━━━━━━━━╯\n\n📸 IMAGE => Type /ai + question, click 📷";
        }

        function getInfo() {
            return "🤖 BOT INFORMATION\n\n╭━━━━━━━━━━━━━━╮\n┃ Mini Assistant\n┃ Version 1.0\n┃ AI: GPT-4o-mini\n╰━━━━━━━━━━━━━━╯\n\n📊 STATISTICS\n• Model: openai/gpt-4o-mini\n• Capability: ✅ Text + Image Analysis\n• Speed: ⚡ 1-2 seconds\n• Intelligence: 🧠 GPT-4 level\n• Price: 💰 ₱0.008 per chat\n• Commands: 20+\n• Auto-responses: 200+\n\n⚙️ FEATURES\n• 🤖 Text Chat with GPT-4o-mini\n• 🖼️ Image Analysis with Vision\n• 😂 Jokes & Facts\n• 📖 Dictionary\n• 🧮 Calculator\n• 📝 Notes\n• ⏲️ Timer\n\n🔧 DEVELOPER:\nCreated by selov with ❤️\n\n💡 Tip => Type /ai + question + 📷 for images!";
        }

        async function processCommand(msg) {
            const parts = msg.split(" ");
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1).join(" ");

            if (cmd === "/help") return getHelp();
            if (cmd === "/info") return getInfo();
            if (cmd === "/clear") {
                document.getElementById('botMessages').innerHTML = '';
                return "Chat cleared! Type /help to see commands.";
            }

            if (cmd === "/joke") return getJoke();
            if (cmd === "/fact") return getFact();
            if (cmd === "/quote") return getQuote();

            if (cmd === "/calc" && args) return calculate(args);
            if (cmd === "/math" && args) return calculate(args);

            if (cmd === "/note" && args) {
                userNotes.push({ text: args, date: new Date().toLocaleString() });
                localStorage.setItem('botNotes', JSON.stringify(userNotes));
                return "📝 Note saved! Use /notes to view.";
            }
            if (cmd === "/notes") {
                if (!userNotes.length) return "📭 No notes yet.";
                let result = "📋 YOUR NOTES:\n\n";
                userNotes.forEach((note, i) => {
                    result += (i+1) + ". " + note.text + " (" + note.date + ")\n";
                });
                return result;
            }

            if (cmd === "/timer" && args) {
                let sec = parseInt(args);
                if (isNaN(sec)) return "❌ Invalid seconds!";
                setTimeout(() => addBotMessage("⏰ Timer done! " + sec + "s", false), sec * 1000);
                return "⏲️ Timer set for " + sec + "s";
            }

            if (cmd === "/remind" && args) {
                setTimeout(() => addBotMessage("🔔 Reminder: " + args, false), 10000);
                return "✅ Reminder set (10 seconds)";
            }

            if (cmd === "/define" && args) return await defineWord(args);
            if (cmd === "/synonym" && args) return await getSynonyms(args);
            if (cmd === "/antonym" && args) return await getAntonyms(args);

            if (cmd === "/ai" && args) {
                const res = await askAI(args);
                return "🤖 AI Says\n" + res;
            }
            if (cmd === "/ai" && !args) {
                return "❌ Add a question. Example: /ai what is love?";
            }

            return null;
        }

        async function sendMessage() {
            const input = document.getElementById("botMessageInput");
            const msg = input.value.trim();
            if (!msg) return;

            addBotMessage(msg, true);
            input.value = "";

            showTyping();

            try {
                let reply;

                if (msg.startsWith("/")) {
                    reply = await processCommand(msg);
                    if (!reply) reply = "❌ Unknown command. Type /help";
                } else {
                    reply = getAutoResponse(msg);
                }

                hideTyping();
                addBotMessage(reply, false);

            } catch (err) {
                console.error("Send error:", err);
                hideTyping();
                addBotMessage("❌ Unexpected error occurred.", false);
            }
        }

        function sendQuickReply(text) {
            document.getElementById('botMessageInput').value = text;
            sendMessage();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (userName !== 'User') {
                setTimeout(() => {
                    const welcomeMsg = getRandomFromArray(greetings) + " Welcome back, " + userName + "! 👋";
                    addBotMessage(welcomeMsg, false);
                }, 500);
            }
        });
    </script>
